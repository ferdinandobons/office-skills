<svg width="3840" height="1410" viewBox="0 0 1280 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OfficeSkills: extract a company's Word, PowerPoint or Excel template into a reusable Brand Profile, then generate unlimited on-brand documents of that same format. One skill per format, no cross-format conversion.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1022"/>
      <stop offset="0.55" stop-color="#111A36"/>
      <stop offset="1" stop-color="#0C1430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#5B8DEF"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6EA8FE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6EA8FE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6EA8FE" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6.5" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6EA8FE"/>
    </marker>
  </defs>

  <rect width="1280" height="470" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="470" rx="20" fill="url(#dots)"/>
  <rect x="0.5" y="0.5" width="1279" height="469" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>

  <!-- TOP BAND -->
  <g>
    <rect x="44" y="38" width="18" height="18" rx="4" fill="#2B7CD3"/>
    <rect x="65" y="38" width="18" height="18" rx="4" fill="#E0742B"/>
    <rect x="44" y="59" width="18" height="18" rx="4" fill="#2BA45F"/>
    <rect x="65" y="59" width="18" height="18" rx="4" fill="#6EA8FE"/>
  </g>
  <text x="100" y="73" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, sans-serif" font-size="38" font-weight="800" letter-spacing="-0.5" fill="#FFFFFF">Office<tspan fill="#6EA8FE">Skills</tspan></text>

  <text x="1236" y="52" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16.5" font-weight="600" fill="#C9D8F5">Your company's Office template, learned once.</text>
  <text x="1236" y="78" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16.5" font-weight="500" fill="#9DB4E8">Unlimited on-brand documents, in the same format.</text>

  <line x1="44" y1="108" x2="1236" y2="108" stroke="#FFFFFF" stroke-opacity="0.07"/>

  <!-- STAGE A: company template -->
  <g filter="url(#soft)">
    <rect x="60" y="158" width="190" height="160" rx="13" fill="#161F3D" stroke="#2C3A66" stroke-width="1.6"/>
    <rect x="60" y="158" width="190" height="30" rx="13" fill="#1E2A50"/>
    <circle cx="82" cy="173" r="6.5" fill="url(#accent)"/>
    <rect x="97" y="169" width="62" height="9" rx="4.5" fill="#43568C"/>
    <text x="82" y="226" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#E8EEFF">Aa</text>
    <rect x="132" y="209" width="96" height="8" rx="4" fill="#3A4A7C"/>
    <rect x="132" y="224" width="76" height="8" rx="4" fill="#33426F"/>
    <rect x="82" y="244" width="21" height="21" rx="5" fill="#2B7CD3"/>
    <rect x="109" y="244" width="21" height="21" rx="5" fill="#E0742B"/>
    <rect x="136" y="244" width="21" height="21" rx="5" fill="#2BA45F"/>
    <rect x="163" y="244" width="21" height="21" rx="5" fill="#F472B6"/>
    <rect x="82" y="282" width="148" height="7" rx="3.5" fill="#2E3C68"/>
    <rect x="82" y="296" width="120" height="7" rx="3.5" fill="#2A375F"/>
    <rect x="60" y="200" width="190" height="22" fill="url(#scan)"/>
  </g>
  <text x="155" y="342" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#9DB4E8">your company template</text>

  <!-- STEP 1: EXTRACT -->
  <line x1="264" y1="240" x2="388" y2="240" stroke="#3C4E84" stroke-width="2.8" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <circle cx="304" cy="200" r="12.5" fill="url(#accent)"/>
  <text x="304" y="205" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800" fill="#0B1022">1</text>
  <text x="324" y="206" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16.5" font-weight="700" fill="#9DC0FF">EXTRACT</text>
  <text x="330" y="280" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13.5" fill="#7E96CC">learn the brand</text>

  <!-- STAGE B: Brand Profile -->
  <g filter="url(#soft)">
    <rect x="406" y="146" width="368" height="188" rx="15" fill="#16213F" stroke="url(#accent)" stroke-width="1.8"/>
    <g transform="translate(428,166)">
      <rect x="0" y="0" width="25" height="25" rx="5" fill="#0E1730" stroke="#6EA8FE" stroke-width="1.7"/>
      <rect x="6" y="0" width="13" height="8" rx="1" fill="#6EA8FE"/>
      <rect x="6" y="14" width="13" height="9" rx="1" fill="none" stroke="#6EA8FE" stroke-width="1.4"/>
    </g>
    <text x="464" y="180" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#EAF1FF">Brand Profile</text>
    <text x="464" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8FA6D8">brand-kit/ · saved once, reused freely</text>
    <line x1="424" y1="214" x2="758" y2="214" stroke="#2C3A66"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13.5" fill="#C9D8F5">
      <circle cx="432" cy="238" r="2.8" fill="#6EA8FE"/><text x="443" y="242">colors &amp; fonts</text>
      <circle cx="432" cy="264" r="2.8" fill="#6EA8FE"/><text x="443" y="268">named styles -&gt; roles</text>
      <circle cx="432" cy="290" r="2.8" fill="#6EA8FE"/><text x="443" y="294">ordered structure</text>
      <circle cx="432" cy="316" r="2.8" fill="#6EA8FE"/><text x="443" y="320">layouts</text>
      <circle cx="606" cy="238" r="2.8" fill="#6EA8FE"/><text x="617" y="242">cover anchors</text>
      <circle cx="606" cy="264" r="2.8" fill="#6EA8FE"/><text x="617" y="268">logos &amp; media</text>
      <circle cx="606" cy="290" r="2.8" fill="#6EA8FE"/><text x="617" y="294">tables &amp; formulas</text>
      <circle cx="606" cy="316" r="2.8" fill="#6EA8FE"/><text x="617" y="320">byte-for-byte shell</text>
    </g>
  </g>

  <!-- STEP 2: GENERATE -->
  <line x1="780" y1="240" x2="978" y2="240" stroke="#3C4E84" stroke-width="2.8" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <circle cx="792" cy="200" r="12.5" fill="url(#accent)"/>
  <text x="792" y="205" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800" fill="#0B1022">2</text>
  <text x="812" y="206" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16.5" font-weight="700" fill="#9DC0FF">GENERATE</text>
  <text x="842" y="280" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13.5" fill="#7E96CC">fill the shell · QA pass</text>

  <!-- STAGE C: a stack of on-brand documents (same format) -->
  <g filter="url(#soft)">
    <rect x="1010" y="174" width="168" height="148" rx="11" fill="#16203E" stroke="#2C3A66" stroke-width="1.4" opacity="0.45"/>
    <rect x="997" y="187" width="168" height="148" rx="11" fill="#17243F" stroke="#33467A" stroke-width="1.4" opacity="0.75"/>
    <rect x="984" y="200" width="168" height="148" rx="11" fill="#1A2748" stroke="url(#accent)" stroke-width="1.8"/>
    <rect x="984" y="200" width="168" height="28" rx="11" fill="#244A86"/>
    <circle cx="1003" cy="214" r="5.5" fill="#6EA8FE"/>
    <rect x="1016" y="210" width="52" height="8" rx="4" fill="#4E6BA8"/>
    <rect x="1001" y="246" width="18" height="18" rx="4" fill="#2B7CD3"/>
    <rect x="1024" y="246" width="18" height="18" rx="4" fill="#E0742B"/>
    <rect x="1047" y="246" width="18" height="18" rx="4" fill="#2BA45F"/>
    <rect x="1001" y="280" width="128" height="7" rx="3.5" fill="#33467A"/>
    <rect x="1001" y="294" width="108" height="7" rx="3.5" fill="#2C3C68"/>
    <rect x="1001" y="308" width="120" height="7" rx="3.5" fill="#2C3C68"/>
  </g>
  <text x="1068" y="362" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#9DB4E8">unlimited on-brand documents</text>
  <text x="1068" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#7E96CC">same format as the template</text>

  <!-- FOOTER: one skill per format -->
  <line x1="44" y1="404" x2="1236" y2="404" stroke="#FFFFFF" stroke-opacity="0.07"/>
  <text x="60" y="436" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#9DB4E8">One skill per format, same type in and out:</text>
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="446" y="420" width="148" height="30" rx="9" fill="#16213F" stroke="#2C3A66"/>
    <rect x="459" y="427" width="17" height="17" rx="4" fill="#102742" stroke="#2B7CD3" stroke-width="1.3"/>
    <text x="467.5" y="440" text-anchor="middle" font-size="11" font-weight="800" fill="#7FB6F2">W</text>
    <text x="486" y="440" font-size="13.5" fill="#EAF1FF" font-weight="600">Word <tspan fill="#7E96CC" font-family="ui-monospace, Menlo, monospace" font-size="12">.docx</tspan></text>

    <rect x="610" y="420" width="200" height="30" rx="9" fill="#16213F" stroke="#2C3A66"/>
    <rect x="623" y="427" width="17" height="17" rx="4" fill="#33240F" stroke="#E0742B" stroke-width="1.3"/>
    <text x="631.5" y="440" text-anchor="middle" font-size="11" font-weight="800" fill="#F2A368">P</text>
    <text x="650" y="440" font-size="13.5" fill="#EAF1FF" font-weight="600">PowerPoint <tspan fill="#7E96CC" font-family="ui-monospace, Menlo, monospace" font-size="12">.pptx</tspan></text>

    <rect x="826" y="420" width="146" height="30" rx="9" fill="#16213F" stroke="#2C3A66"/>
    <rect x="839" y="427" width="17" height="17" rx="4" fill="#0F2A1C" stroke="#2BA45F" stroke-width="1.3"/>
    <text x="847.5" y="440" text-anchor="middle" font-size="11" font-weight="800" fill="#6FD79E">X</text>
    <text x="866" y="440" font-size="13.5" fill="#EAF1FF" font-weight="600">Excel <tspan fill="#7E96CC" font-family="ui-monospace, Menlo, monospace" font-size="12">.xlsx</tspan></text>
  </g>
</svg>
