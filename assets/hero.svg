<svg width="1280" height="500" viewBox="0 0 1280 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BrandDocs workflow</title>
  <desc id="desc">BrandDocs turns real Word, PowerPoint and Excel templates into reusable AI document-generation skills by extracting a Brand Profile, composing from the original components, and verifying on-brand output.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.55" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#F6F8FC"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="inkCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14213D"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1E3A8A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 z" fill="#2563EB"/>
    </marker>
  </defs>

  <rect width="1280" height="500" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="498" rx="26" fill="none" stroke="#CBD5E1" stroke-width="2"/>

  <text x="56" y="68" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="46" font-weight="850" fill="#0F172A">Brand<tspan fill="#2563EB">Docs</tspan></text>
  <text x="56" y="103" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#334155">Template in. Brand-safe documents out.</text>
  <text x="1224" y="62" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="750" fill="#0F172A">Word / PowerPoint / Excel</text>
  <text x="1224" y="91" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" font-weight="600" fill="#64748B">real components, not template imitation</text>

  <line x1="56" y1="126" x2="1224" y2="126" stroke="#CBD5E1" stroke-width="1.4"/>

  <!-- Real template -->
  <rect x="56" y="154" width="252" height="220" rx="20" fill="#FFFFFF" stroke="#D6E1F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="82" y="190" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="850" letter-spacing="1.2" fill="#2563EB">REAL TEMPLATE</text>
  <text x="82" y="216" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#0F172A">Your source of truth</text>
  <text x="82" y="240" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14.5" font-weight="650" fill="#64748B">Styles, sections, layouts</text>
  <text x="82" y="260" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14.5" font-weight="650" fill="#64748B">and formulas already live here.</text>

  <rect x="82" y="276" width="118" height="72" rx="12" fill="#F8FAFC" stroke="#D6E1F0" stroke-width="1.5"/>
  <rect x="82" y="276" width="118" height="22" rx="12" fill="#DBEAFE"/>
  <circle cx="99" cy="287" r="5" fill="#2563EB"/>
  <text x="103" y="335" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="800" fill="#1E293B">Aa</text>
  <rect x="214" y="278" width="55" height="22" rx="8" fill="#DBEAFE"/>
  <text x="241.5" y="293" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#1D4ED8">styles</text>
  <rect x="214" y="307" width="65" height="22" rx="8" fill="#FFEDD5"/>
  <text x="246.5" y="322" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#C2410C">layouts</text>
  <rect x="214" y="336" width="76" height="22" rx="8" fill="#DCFCE7"/>
  <text x="252" y="351" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#15803D">formulas</text>

  <!-- Extract arrow -->
  <line x1="326" y1="264" x2="390" y2="264" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="358" y="229" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#1D4ED8">EXTRACT</text>
  <text x="358" y="246" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#1D4ED8">ONCE</text>
  <text x="358" y="298" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#64748B">no guessing</text>

  <!-- Brand Profile -->
  <rect x="410" y="136" width="470" height="256" rx="24" fill="url(#inkCard)" filter="url(#shadow)"/>
  <rect x="412" y="138" width="466" height="252" rx="22" fill="none" stroke="#60A5FA" stroke-width="2.2"/>
  <text x="444" y="184" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="850" letter-spacing="1.2" fill="#93C5FD">BRAND PROFILE</text>
  <text x="444" y="219" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="29" font-weight="850" fill="#FFFFFF">Reusable component map</text>
  <text x="444" y="248" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#BFD7FF">The agent composes with real template parts,</text>
  <text x="444" y="271" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#BFD7FF">then QA verifies every choice.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13.5" font-weight="800">
    <rect x="444" y="292" width="132" height="34" rx="10" fill="#1E3A5F" stroke="#3B82F6"/>
    <circle cx="461" cy="309" r="4" fill="#60A5FA"/>
    <text x="474" y="314" fill="#EAF3FF">styles -> roles</text>
    <rect x="590" y="292" width="112" height="34" rx="10" fill="#1E3A5F" stroke="#3B82F6"/>
    <circle cx="607" cy="309" r="4" fill="#60A5FA"/>
    <text x="620" y="314" fill="#EAF3FF">structure</text>
    <rect x="716" y="292" width="120" height="34" rx="10" fill="#1E3A5F" stroke="#3B82F6"/>
    <circle cx="733" cy="309" r="4" fill="#60A5FA"/>
    <text x="746" y="314" fill="#EAF3FF">layouts</text>

    <rect x="444" y="340" width="118" height="34" rx="10" fill="#183A2A" stroke="#22C55E"/>
    <circle cx="461" cy="357" r="4" fill="#4ADE80"/>
    <text x="474" y="362" fill="#E9FFF0">formulas</text>
    <rect x="576" y="340" width="138" height="34" rx="10" fill="#3B2A16" stroke="#F97316"/>
    <circle cx="593" cy="357" r="4" fill="#FDBA74"/>
    <text x="606" y="362" fill="#FFF3E7">named ranges</text>
    <rect x="728" y="340" width="108" height="34" rx="10" fill="#3B1D32" stroke="#EC4899"/>
    <circle cx="745" cy="357" r="4" fill="#F9A8D4"/>
    <text x="758" y="362" fill="#FFF0F8">brand kit</text>
  </g>

  <!-- Generate arrow -->
  <line x1="900" y1="264" x2="962" y2="264" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="931" y="229" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#1D4ED8">COMPOSE</text>
  <text x="931" y="246" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#1D4ED8">+ QA</text>
  <text x="931" y="298" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#64748B">from shell</text>

  <!-- Output -->
  <rect x="982" y="154" width="242" height="220" rx="20" fill="#FFFFFF" stroke="#D6E1F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="1008" y="190" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="850" letter-spacing="1.2" fill="#16A34A">ON-BRAND OUTPUT</text>
  <text x="1008" y="216" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#0F172A">Reports, decks, workbooks</text>

  <rect x="1046" y="244" width="110" height="86" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.6"/>
  <rect x="1032" y="258" width="110" height="86" rx="12" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.6"/>
  <rect x="1018" y="272" width="110" height="86" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.8"/>
  <rect x="1034" y="292" width="24" height="24" rx="7" fill="#2563EB"/>
  <rect x="1064" y="292" width="24" height="24" rx="7" fill="#F97316"/>
  <rect x="1094" y="292" width="24" height="24" rx="7" fill="#22C55E"/>
  <rect x="1034" y="329" width="78" height="7" rx="3.5" fill="#94A3B8"/>
  <rect x="1034" y="342" width="62" height="7" rx="3.5" fill="#CBD5E1"/>

  <text x="1165" y="274" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13.5" font-weight="800" fill="#1D4ED8">same format</text>
  <text x="1165" y="298" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13.5" font-weight="800" fill="#15803D">brand safe</text>
  <text x="1165" y="322" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13.5" font-weight="800" fill="#C2410C">repeatable</text>

  <!-- Promise band -->
  <rect x="56" y="420" width="1168" height="52" rx="18" fill="#0F172A"/>
  <text x="84" y="452" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#FFFFFF">Core promise:</text>
  <text x="222" y="452" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#DCEBFF">brand, structure, styles and formulas preserved by construction</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13.5" font-weight="850">
    <rect x="899" y="431" width="88" height="30" rx="10" fill="#1E3A5F" stroke="#3B82F6"/>
    <text x="943" y="451" text-anchor="middle" fill="#BFDBFE">DOCX</text>
    <rect x="1000" y="431" width="88" height="30" rx="10" fill="#3B2A16" stroke="#F97316"/>
    <text x="1044" y="451" text-anchor="middle" fill="#FED7AA">PPTX</text>
    <rect x="1101" y="431" width="88" height="30" rx="10" fill="#183A2A" stroke="#22C55E"/>
    <text x="1145" y="451" text-anchor="middle" fill="#BBF7D0">XLSX</text>
  </g>
</svg>
